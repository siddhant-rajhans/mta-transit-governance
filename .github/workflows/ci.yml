name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests (rules + committed-data contract)
        run: python -m pytest tests/ -v

      - name: Run data quality checks against committed data
        run: python scripts/data_quality_checks.py

      - name: Rebuild dashboard charts (smoke test)
        run: python scripts/build_dashboard_charts.py
